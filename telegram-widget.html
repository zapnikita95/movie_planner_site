<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Telegram Login</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #111119;
      color: #fff;
      font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 20px;
      background: #229ed9;
      color: #fff;
      font: inherit;
      font-weight: 800;
    }
    p {
      margin: 14px 0 0;
      color: rgba(255,255,255,.64);
      font-size: 13px;
    }
  </style>
  <script async src="https://telegram.org/js/telegram-widget.js?22"></script>
</head>
<body>
  <main>
    <button type="button" id="telegram-login">Войти через Telegram</button>
    <p id="telegram-status">Откроется официальное окно Telegram.</p>
  </main>
  <script>
    (function () {
      var CLIENT_ID = 8554485843;
      var statusEl = document.getElementById('telegram-status');
      function send(payload) {
        try {
          window.ReactNativeWebView.postMessage(JSON.stringify(payload || {}));
        } catch (_) {}
      }
      function openTelegram() {
        if (!window.Telegram || !window.Telegram.Login || typeof window.Telegram.Login.auth !== 'function') {
          if (statusEl) statusEl.textContent = 'Telegram Login ещё загружается, попробуйте снова.';
          return;
        }
        window.Telegram.Login.auth(
          { client_id: CLIENT_ID, request_access: ['write'] },
          function (payload) {
            if (!payload) {
              if (statusEl) statusEl.textContent = 'Вход отменён.';
              return;
            }
            send(payload);
          }
        );
      }
      document.getElementById('telegram-login').addEventListener('click', openTelegram);
      setTimeout(openTelegram, 500);
    })();
  </script>
</body>
</html>
