<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <!--MP_ROUTE_META-->
  <script>
    (function () {
      var path = location.pathname || '';
      var mFilm = path.match(/^\/f\/(\d+)\/?$/);
      var mStaff = path.match(/^\/s\/(\d+)\/?$/);
      if (mFilm) {
        var kp = mFilm[1];
        var poster = 'https://st.kp.yandex.net/images/film_big/' + kp + '.jpg';
        var page = location.origin + '/f/' + kp;
        document.write(
          '<meta property="og:type" content="video.movie">' +
          '<meta property="og:url" content="' + page + '">' +
          '<meta property="og:site_name" content="Movie Planner">' +
          '<meta property="og:image" content="' + poster + '">' +
          '<meta property="og:title" content="Фильм · Movie Planner">' +
          '<meta property="og:description" content="Карточка фильма в Movie Planner">' +
          '<meta name="description" content="Карточка фильма в Movie Planner: описание, актеры, оценка и действия.">' +
          '<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">' +
          '<meta name="twitter:card" content="summary_large_image">' +
          '<meta name="twitter:title" content="Фильм · Movie Planner">' +
          '<meta name="twitter:description" content="Карточка фильма в Movie Planner">' +
          '<meta name="twitter:image" content="' + poster + '">' +
          '<link rel="canonical" href="' + page + '">'
        );
        return;
      }
      if (mStaff) {
        var pid = mStaff[1];
        var pageS = location.origin + '/s/' + pid;
        var photo = 'https://st.kp.yandex.net/images/actor_iphone/iphone360_' + pid + '.jpg';
        var ogTitle = 'Персона · Movie Planner';
        var ogDesc = 'Страница актёра и фильмография в Movie Planner';
        var pageTitle = ogTitle;
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', 'https://api.movie-planner.ru/api/public/staff/' + encodeURIComponent(pid), false);
          xhr.send(null);
          if (xhr.status === 200) {
            var payload = JSON.parse(xhr.responseText);
            if (payload && payload.success && payload.staff) {
              var st = payload.staff;
              if (st.photo_url) photo = st.photo_url;
              if (st.og_title) ogTitle = st.og_title;
              if (st.og_description) ogDesc = st.og_description;
              if (st.name) pageTitle = st.name + ' · Movie Planner';
            }
          }
        } catch (_e) {}
        var esc = function (s) {
          return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        };
        document.write(
          '<title>' + esc(pageTitle) + '</title>' +
          '<meta property="og:type" content="profile">' +
          '<meta property="og:url" content="' + pageS + '">' +
          '<meta property="og:site_name" content="Movie Planner">' +
          '<meta property="og:title" content="' + esc(ogTitle) + '">' +
          '<meta property="og:description" content="' + esc(ogDesc) + '">' +
          '<meta property="og:image" content="' + esc(photo) + '">' +
          '<meta property="og:image:secure_url" content="' + esc(photo) + '">' +
          '<meta name="description" content="' + esc(ogDesc) + '">' +
          '<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">' +
          '<meta name="twitter:card" content="summary_large_image">' +
          '<meta name="twitter:title" content="' + esc(ogTitle) + '">' +
          '<meta name="twitter:description" content="' + esc(ogDesc) + '">' +
          '<meta name="twitter:image" content="' + esc(photo) + '">' +
          '<link rel="canonical" href="' + pageS + '">'
        );
        return;
      }
      document.write('<meta name="robots" content="noindex,nofollow">');
    })();
  </script>
  <title>Movie Planner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style-v2.css?v=20260526stafffilters">
  <style>:root { color-scheme: dark; } .hidden { display: none !important; }</style>
  <script>
    (function () {
      var loc = window.location;
      var userMatch = loc.pathname.match(/^\/u\/(\d+)\/?$/);
      if (userMatch) {
        loc.replace(loc.origin + '/?add=' + encodeURIComponent(userMatch[1]) + loc.hash);
        return;
      }
      if (!loc.pathname.match(/^\/f\/(\d+)\/?$/) && !loc.pathname.match(/^\/s\/(\d+)\/?$/)) {
        var target = loc.pathname + loc.search + loc.hash;
        loc.replace(loc.origin + '/?__spa=' + encodeURIComponent(target));
      }
    })();
  </script>
</head>
<body>
  <noscript><p style="color:#fff;background:#111;padding:20px;font-family:sans-serif">Откройте Movie Planner с включённым JavaScript.</p></noscript>
  <script src="/telegram-open.js?v=20260526emailapi"></script>
  <script src="/public-film-login.js?v=20260526tgauth"></script>
  <script src="/film-page.js?v=20260526filmrating"></script>
  <script src="/staff-page.js?v=20260526stafffilters"></script>
  <script>
    (function () {
      var m = location.pathname.match(/^\/f\/(\d+)\/?$/);
      if (!m || !window.MpFilmPage) return;
      MpFilmPage.bootstrap({ kpId: m[1] });
    })();
  </script>
  <script>
    (function () {
      var m = location.pathname.match(/^\/s\/(\d+)\/?$/);
      if (!m || !window.MpStaffPage) return;
      MpStaffPage.bootstrap({ personId: m[1] });
    })();
  </script>
</body>
</html>
