<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Movie Planner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0b13;
      color: #f4f6ff;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 20px 16px 28px; }
    .brand { color: #aab3d2; font-size: 13px; margin-bottom: 14px; }
    .card {
      display: grid;
      grid-template-columns: 120px minmax(0,1fr);
      gap: 14px;
      background: #111424;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 16px;
      padding: 12px;
    }
    .poster { width: 120px; height: 178px; border-radius: 10px; object-fit: cover; background: #1a1f33; }
    h1 { margin: 0; font-size: 22px; line-height: 1.25; }
    p { margin: 10px 0 0; color: #aab3d2; line-height: 1.45; font-size: 14px; }
    .actions { margin-top: 14px; display: grid; gap: 8px; }
    .btn {
      display: inline-block; text-decoration: none; text-align: center;
      color: #fff; padding: 12px 14px; border-radius: 12px; font-weight: 600; font-size: 14px;
      border: 0;
    }
    .btn-main { background: linear-gradient(135deg,#a855f7,#ec4899); }
    .btn-sec { background: rgba(255,255,255,.1); }
    .hint { margin-top: 10px; color: #aab3d2; font-size: 12px; }
    @media (max-width: 620px) {
      .card { grid-template-columns: 1fr; }
      .poster { width: 138px; height: 205px; margin: 0 auto; }
      .meta { text-align: center; }
    }
  </style>
  <script>
    // SPA shim для GitHub Pages: неизвестные пути → /?__spa=…
    // API и бэкенд — на https://api.movie-planner.ru (см. docs/DNS_RUSSIA_WITHOUT_CLOUDFLARE.md).
    (function () {
      var loc = window.location;
      var userMatch = loc.pathname.match(/^\/u\/(\d+)\/?$/);
      if (userMatch) {
        loc.replace(loc.origin + '/?add=' + encodeURIComponent(userMatch[1]) + loc.hash);
        return;
      }
      var filmMatch = loc.pathname.match(/^\/f\/(\d+)\/?$/);
      if (filmMatch) {
        var kpId = filmMatch[1];
        var poster = 'https://st.kp.yandex.net/images/film_big/' + kpId + '.jpg';
        var appScheme = 'movieplanner://film/' + encodeURIComponent(kpId);
        var webOpen = loc.origin + '/?kp_open=' + encodeURIComponent(kpId);
        var tgMini = 'https://t.me/movie_planner_bot/app?startapp=' + encodeURIComponent('film_' + kpId);
        document.title = 'Фильм · Movie Planner';
        document.body.innerHTML =
          '<div class="wrap">' +
          '<div class="brand">Movie Planner</div>' +
          '<div class="card">' +
          '<img class="poster" src="' + poster + '" alt="Постер" onerror="this.style.visibility=\'hidden\'">' +
          '<div class="meta">' +
          '<h1>Фильм #' + kpId + '</h1>' +
          '<p>Откройте фильм в приложении, браузере или Telegram Mini App.</p>' +
          '<div class="actions">' +
          '<a class="btn btn-main" id="open-app" href="' + webOpen + '">Открыть в Movie Planner</a>' +
          '<a class="btn btn-sec" href="' + webOpen + '">Открыть в браузере</a>' +
          '<a class="btn btn-sec" href="' + tgMini + '">Открыть в Telegram Mini App</a>' +
          '</div>' +
          '<p class="hint" id="hint">Выберите способ открытия.</p>' +
          '</div>' +
          '</div>' +
          '</div>';
        var ua = navigator.userAgent || '';
        var isMobile = /Android|iPhone|iPad|iPod/i.test(ua);
        var openApp = document.getElementById('open-app');
        var hint = document.getElementById('hint');
        if (openApp && isMobile) {
          openApp.addEventListener('click', function (e) {
            e.preventDefault();
            if (hint) hint.textContent = 'Пытаемся открыть приложение…';
            try { window.location.href = appScheme; } catch (_e) {}
          });
        }
        return;
      }
      var target = loc.pathname + loc.search + loc.hash;
      loc.replace(loc.origin + '/?__spa=' + encodeURIComponent(target));
    })();
  </script>
</head>
<body>
  <noscript>
    <p style="color:#fff;background:#111;padding:20px;font-family:sans-serif">
      Страница не найдена. <a href="/" style="color:#ec4899">Открыть Movie Planner</a>.
    </p>
  </noscript>
</body>
</html>
