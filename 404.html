<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Movie Planner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(900px 620px at 20% -10%, rgba(168,85,247,.22), transparent 60%),
        radial-gradient(760px 520px at 84% 4%, rgba(236,72,153,.16), transparent 58%),
        #070711;
      color: #f4f6ff;
      min-height: 100vh;
    }
    a { color: inherit; }
    .page-shell { min-height: 100vh; padding: 18px clamp(16px, 4vw, 56px) 0; }
    #site-header {
      max-width: 1180px;
      margin: 0 auto 28px;
      position: sticky;
      top: 14px;
      z-index: 20;
    }
    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px;
      background: rgba(7,7,17,.72);
      backdrop-filter: blur(22px);
      box-shadow: 0 18px 48px rgba(0,0,0,.28);
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: Unbounded, Inter, sans-serif;
      font-weight: 800;
      letter-spacing: -.04em;
    }
    .logo img { width: 34px; height: 34px; border-radius: 10px; }
    .header-search {
      position: relative;
      flex: 1;
      max-width: 520px;
      min-width: 180px;
    }
    .header-search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(244,246,255,.56);
      pointer-events: none;
    }
    .header-search-input {
      width: 100%;
      height: 46px;
      padding: 0 44px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      color: #fff;
      outline: none;
      font: inherit;
      font-weight: 700;
    }
    .header-search-input:focus { border-color: rgba(236,72,153,.55); box-shadow: 0 0 0 4px rgba(236,72,153,.1); }
    .header-search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      color: #fff;
      cursor: pointer;
    }
    .header-search-dropdown {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 10px);
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      background: rgba(13,13,26,.96);
      box-shadow: 0 22px 58px rgba(0,0,0,.42);
      z-index: 40;
    }
    .search-result {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
    }
    .search-result:hover { background: rgba(255,255,255,.08); }
    .search-result img { width: 42px; height: 58px; border-radius: 8px; object-fit: cover; background: rgba(255,255,255,.08); }
    .search-result-title { font-weight: 800; }
    .search-result-meta { margin-top: 3px; color: rgba(244,246,255,.58); font-size: 12px; }
    .header-buttons { display: flex; align-items: center; gap: 10px; }
    .btn-primary {
      min-height: 46px;
      padding: 0 20px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg,#a855f7,#ec4899);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 36px rgba(236,72,153,.22);
    }
    .movie-page { max-width: 1180px; margin: 0 auto; }
    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(230px, 330px) minmax(0, 1fr);
      gap: clamp(22px, 4vw, 46px);
      align-items: end;
      min-height: 560px;
      padding: clamp(18px, 4vw, 38px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(255,255,255,.09), rgba(255,255,255,.035));
      box-shadow: 0 28px 90px rgba(0,0,0,.42);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(7,7,17,.96) 0%, rgba(7,7,17,.84) 44%, rgba(7,7,17,.42) 100%),
        var(--film-backdrop, none);
      background-size: cover;
      background-position: center;
      opacity: .92;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 46%;
      background: linear-gradient(180deg, transparent, rgba(7,7,17,.9));
      pointer-events: none;
    }
    .poster-wrap,
    .hero-content { position: relative; z-index: 1; }
    .poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 24px;
      object-fit: cover;
      background: #151528;
      box-shadow: 0 24px 70px rgba(0,0,0,.55);
    }
    .eyebrow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(244,246,255,.82);
      font-size: 13px;
      font-weight: 700;
    }
    h1 {
      margin: 0;
      max-width: 820px;
      font-family: Unbounded, Inter, sans-serif;
      font-size: clamp(34px, 6vw, 76px);
      line-height: .95;
      letter-spacing: -.07em;
    }
    .description {
      margin: 20px 0 0;
      max-width: 760px;
      color: rgba(244,246,255,.78);
      font-size: clamp(16px, 1.7vw, 20px);
      line-height: 1.6;
    }
    .hero-actions {
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn {
      appearance: none;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 18px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 14px;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-main { background: linear-gradient(135deg,#a855f7,#ec4899); box-shadow: 0 18px 42px rgba(236,72,153,.24); }
    .btn-secondary { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.12); }
    .btn-ghost { background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.1); color: rgba(244,246,255,.86); }
    .icon-actions {
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .icon-action {
      width: 54px;
      min-width: 54px;
      height: 54px;
      padding: 0;
      overflow: hidden;
      gap: 10px;
      border-radius: 18px;
      white-space: nowrap;
    }
    .icon-action .ico { flex: 0 0 auto; font-size: 22px; line-height: 1; }
    .icon-action .label {
      max-width: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-width .22s ease, opacity .18s ease;
    }
    .icon-action:hover,
    .icon-action:focus-visible {
      width: auto;
      min-width: 190px;
      padding: 0 18px;
    }
    .icon-action:hover .label,
    .icon-action:focus-visible .label {
      max-width: 220px;
      opacity: 1;
    }
    .plan-action {
      min-width: 230px;
      height: 54px;
      border-radius: 18px;
    }
    .sections {
      margin-top: 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }
    .panel {
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 28px;
      padding: 22px;
      background: rgba(16,16,31,.78);
      box-shadow: 0 16px 54px rgba(0,0,0,.28);
      backdrop-filter: blur(18px);
    }
    .panel h2 {
      margin: 0 0 14px;
      font-family: Unbounded, Inter, sans-serif;
      font-size: 22px;
      letter-spacing: -.04em;
    }
    .facts-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .facts-list li {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.055);
      color: rgba(244,246,255,.8);
      line-height: 1.48;
    }
    .rating-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(72px, 1fr));
      gap: 8px;
      margin-top: 16px;
      max-width: 620px;
    }
    .rate-btn {
      min-height: 44px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    .status {
      margin-top: 12px;
      min-height: 20px;
      color: rgba(244,246,255,.64);
      font-size: 13px;
    }
    .footer {
      margin-top: 42px;
      padding: 32px clamp(16px,4vw,56px);
      border-top: 1px solid rgba(255,255,255,.1);
      background: rgba(4,4,12,.72);
    }
    .footer-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: rgba(244,246,255,.66);
      font-size: 14px;
    }
    .footer-links { display: flex; flex-wrap: wrap; gap: 12px; }
    .footer a { color: rgba(244,246,255,.76); text-decoration: none; }
    .skeleton {
      position: relative;
      overflow: hidden;
      color: transparent !important;
      background: rgba(255,255,255,.08) !important;
      border-radius: 10px;
    }
    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.13), transparent);
      animation: shimmer 1.1s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    @media (max-width: 860px) {
      .page-shell { padding: 14px 12px 32px; }
      #site-header { top: 8px; margin-bottom: 16px; }
      .header-content { flex-wrap: wrap; border-radius: 20px; }
      .header-search { order: 3; max-width: none; flex-basis: 100%; }
      .hero {
        grid-template-columns: 1fr;
        min-height: 0;
        padding: 16px;
        border-radius: 26px;
      }
      .poster-wrap { max-width: 230px; }
      .sections { grid-template-columns: 1fr; }
      .hero-actions, .icon-actions { display: flex; }
      .plan-action { min-width: 0; flex: 1 1 220px; }
      h1 { font-size: clamp(32px, 11vw, 54px); }
      .footer-inner { display: grid; }
    }
  </style>
  <script>
    (function () {
      var loc = window.location;
      var userMatch = loc.pathname.match(/^\/u\/(\d+)\/?$/);
      if (userMatch) {
        loc.replace(loc.origin + '/?add=' + encodeURIComponent(userMatch[1]) + loc.hash);
        return;
      }
      if (!loc.pathname.match(/^\/f\/(\d+)\/?$/)) {
        var target = loc.pathname + loc.search + loc.hash;
        loc.replace(loc.origin + '/?__spa=' + encodeURIComponent(target));
      }
    })();
  </script>
</head>
<body>
  <noscript><p style="color:#fff;background:#111;padding:20px;font-family:sans-serif">Откройте Movie Planner с включённым JavaScript.</p></noscript>
  <script>
    (function () {
      var loc = window.location;
      var filmMatch = loc.pathname.match(/^\/f\/(\d+)\/?$/);
      if (!filmMatch) return;

      var kpId = filmMatch[1];
      var poster = 'https://st.kp.yandex.net/images/film_big/' + kpId + '.jpg';
      var tgMini = 'https://t.me/movie_planner_bot/app?startapp=' + encodeURIComponent('film_' + kpId);
      var apiBase = 'https://api.movie-planner.ru';
      var pageUrl = loc.origin + '/f/' + kpId;
      var fallbackFacts = [
        'Добавьте фильм в базу, чтобы он появился в вашем Movie Planner.',
        'Оценка сохранится в профиле и поможет рекомендациям.',
        'Фильм можно сразу запланировать для домашнего просмотра или кинотеатра.'
      ];

      document.title = 'Фильм · Movie Planner';
      document.documentElement.style.setProperty('--film-backdrop', 'url("' + poster + '")');
      document.body.innerHTML =
        '<div class="page-shell">' +
          '<header id="site-header">' +
            '<div class="header-content">' +
              '<a class="logo" href="/"><img src="/images/icon48.png" alt="Movie Planner"><span>Movie Planner</span></a>' +
              '<div class="header-search" id="header-search" role="search">' +
                '<span class="header-search-icon" aria-hidden="true">⌕</span>' +
                '<input type="text" id="header-search-input" class="header-search-input" placeholder="Найти фильм или сериал…" autocomplete="off" aria-label="Поиск">' +
                '<button type="button" class="header-search-clear hidden" id="header-search-clear" aria-label="Очистить">×</button>' +
                '<div class="header-search-dropdown hidden" id="header-search-dropdown" role="listbox"></div>' +
              '</div>' +
              '<div class="header-buttons">' +
                '<button type="button" class="btn-primary" id="login-btn">Войти</button>' +
              '</div>' +
            '</div>' +
          '</header>' +
          '<main class="movie-page">' +
            '<section class="hero">' +
              '<div class="poster-wrap"><img class="poster" id="poster" src="' + poster + '" alt="Постер" onerror="this.style.opacity=.22"></div>' +
              '<div class="hero-content">' +
                '<div class="eyebrow" id="chips"><span class="chip skeleton" id="genre-chip">жанр</span></div>' +
                '<h1 id="film-title">Фильм #' + kpId + '</h1>' +
                '<p class="description skeleton" id="film-desc">Открываем описание фильма в Movie Planner.</p>' +
                '<div class="icon-actions">' +
                  '<button class="btn btn-main icon-action" id="add-btn" type="button" aria-label="Добавить в базу"><span class="ico">＋</span><span class="label">Добавить в базу</span></button>' +
                  '<button class="btn btn-secondary plan-action" id="plan-watch-btn" type="button"><span class="ico">📅</span><span>Запланировать просмотр</span></button>' +
                  '<a class="btn btn-ghost icon-action" href="' + tgMini + '" aria-label="Открыть в Telegram"><span class="ico">↗</span><span class="label">Открыть в Telegram</span></a>' +
                  '<a class="btn btn-ghost icon-action" href="https://www.kinopoisk.ru/film/' + encodeURIComponent(kpId) + '/" target="_blank" rel="noopener" aria-label="Кинопоиск"><span class="ico">КП</span><span class="label">Кинопоиск</span></a>' +
                '</div>' +
              '</div>' +
            '</section>' +
            '<section class="sections">' +
              '<div class="panel">' +
                '<h2>Интересные факты</h2>' +
                '<ul class="facts-list" id="facts-list">' +
                  fallbackFacts.map(function (x) { return '<li>' + x + '</li>'; }).join('') +
                '</ul>' +
              '</div>' +
              '<div class="panel">' +
                '<h2>Оценка</h2>' +
                '<div class="rating-grid" id="rate-grid">' +
                  '<button class="rate-btn" data-rate="6" type="button">6</button>' +
                  '<button class="rate-btn" data-rate="7" type="button">7</button>' +
                  '<button class="rate-btn" data-rate="8" type="button">8</button>' +
                  '<button class="rate-btn" data-rate="9" type="button">9</button>' +
                  '<button class="rate-btn" data-rate="10" type="button">10</button>' +
                '</div>' +
                '<p class="status" id="hint"></p>' +
              '</div>' +
            '</section>' +
          '</main>' +
          '<footer class="footer">' +
            '<div class="footer-inner">' +
              '<div><strong>Контакты</strong><br><a href="mailto:movie_planner_bot@yandex.com">movie_planner_bot@yandex.com</a><br><a href="https://t.me/zapnikita95" target="_blank" rel="noopener">По всем вопросам: @zapnikita95</a></div>' +
              '<div><strong>Мы в соцсетях</strong><br><a href="https://t.me/movie_planner_channel" target="_blank" rel="noopener">Telegram</a> · <a href="https://vc.ru/telegram/2707791-movie-planner-bot-telegram-servis-dlya-planirovaniya-filmov-i-serialov" target="_blank" rel="noopener">VC.ru</a></div>' +
              '<div class="footer-links">' +
                '<span>© ' + String(new Date().getFullYear()) + ' Movie Planner</span>' +
                '<a href="/usloviya-ispolzovaniya.html">Условия использования</a>' +
                '<a href="/politika-konfidentsialnosti.html">Политика конфиденциальности</a>' +
                '<a href="/oferta-i-oplata.html">Оплата и оферта</a>' +
              '</div>' +
            '</div>' +
          '</footer>' +
        '</div>';

      var hint = document.getElementById('hint');

      function setOg(title, desc) {
        var head = document.head;
        function meta(attr, name, content) {
          if (!content) return;
          var el = head.querySelector('meta[' + attr + '="' + name + '"]');
          if (!el) {
            el = document.createElement('meta');
            el.setAttribute(attr, name);
            head.appendChild(el);
          }
          el.setAttribute('content', content);
        }
        meta('property', 'og:url', pageUrl);
        meta('property', 'og:title', title);
        meta('property', 'og:description', desc);
        meta('property', 'og:image', poster);
        meta('name', 'twitter:card', 'summary_large_image');
        meta('name', 'twitter:title', title);
        meta('name', 'twitter:description', desc);
        meta('name', 'twitter:image', poster);
        meta('name', 'description', desc);
      }
      setOg('Фильм · Movie Planner', 'Карточка фильма в Movie Planner');

      function sessions() {
        try { return JSON.parse(localStorage.getItem('mp_site_sessions') || '[]'); } catch (_e) { return []; }
      }
      function token() {
        try {
          var active = localStorage.getItem('mp_site_active_chat_id');
          var row = sessions().find(function (x) { return String(x.chat_id) === String(active); });
          return row ? row.token : null;
        } catch (_e) { return null; }
      }
      function authHeaders() {
        var h = { 'Content-Type': 'application/json' };
        var t = token();
        if (t) h.Authorization = 'Bearer ' + t;
        return h;
      }
      function loginNow() {
        if (hint) hint.textContent = 'Открываем вход…';
        setTimeout(function () {
          window.location.href = apiBase + '/api/site/login?next=' + encodeURIComponent(pageUrl);
        }, 260);
      }
      function rememberAction(action) {
        try { sessionStorage.setItem('mp_public_film_action', action + ':' + kpId); } catch (_e) {}
      }
      function apiGet(path) {
        return fetch(apiBase + path, { method: 'GET', mode: 'cors' }).then(function (r) {
          if (!r.ok) throw new Error('api_' + r.status);
          return r.json();
        });
      }
      function renderFacts(items) {
        var list = document.getElementById('facts-list');
        if (!list) return;
        var arr = (items && items.length ? items : fallbackFacts).slice(0, 6);
        list.innerHTML = '';
        arr.forEach(function (x) {
          var li = document.createElement('li');
          li.textContent = String(x || '');
          list.appendChild(li);
        });
      }

      apiGet('/api/public/film/' + encodeURIComponent(kpId))
        .then(function (data) {
          if (!data || !data.success || !data.film) return;
          var f = data.film;
          var title = (f.title || 'Фильм') + (f.year ? ' (' + f.year + ')' : '');
          var tEl = document.getElementById('film-title');
          var dEl = document.getElementById('film-desc');
          var gEl = document.getElementById('genre-chip');
          if (tEl) tEl.textContent = title;
          if (dEl) {
            dEl.textContent = f.description || 'Откройте фильм в Movie Planner.';
            dEl.classList.remove('skeleton');
          }
          if (gEl) {
            gEl.textContent = f.genres || (f.is_series ? 'сериал' : 'фильм');
            gEl.classList.remove('skeleton');
          }
          if (f.poster_url) {
            var pEl = document.getElementById('poster');
            if (pEl) pEl.src = f.poster_url;
            document.documentElement.style.setProperty('--film-backdrop', 'url("' + f.poster_url + '")');
          }
          document.title = title + ' · Movie Planner';
          setOg(title, f.description || title);
          if (hint) hint.textContent = '';
        })
        .catch(function () {
          var dEl = document.getElementById('film-desc');
          if (dEl) {
            dEl.textContent = 'Не удалось загрузить описание. Попробуйте обновить страницу.';
            dEl.classList.remove('skeleton');
          }
        });

      function loadFacts() {
        return apiGet('/api/public/film/' + encodeURIComponent(kpId) + '/facts')
          .then(function (d) {
            var arr = [];
            if (d && Array.isArray(d.facts)) arr = d.facts.slice(0, 6);
            if (!arr.length && d && Array.isArray(d.bloopers)) arr = d.bloopers.slice(0, 6);
            renderFacts(arr);
          })
          .catch(function () { renderFacts(fallbackFacts); });
      }
      loadFacts();

      function ensureFilm() {
        return fetch(apiBase + '/api/site/add-film', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ kp_id: Number(kpId) })
        }).then(function (r) {
          if (r.status === 401) { loginNow(); return null; }
          return r.json();
        });
      }
      function goCabinet(action) {
        var suffix = action ? '&action=' + encodeURIComponent(action) : '';
        window.location.href = '/?kp_open=' + encodeURIComponent(kpId) + suffix;
      }
      function addCurrentFilm() {
        if (!token()) { rememberAction('add'); loginNow(); return; }
        ensureFilm()
          .then(function (d) {
            if (!d) return;
            if (d.success) {
              if (hint) hint.textContent = 'Фильм добавлен';
              goCabinet('');
            } else if (hint) {
              hint.textContent = d.error || 'Не удалось добавить';
            }
          })
          .catch(function () { if (hint) hint.textContent = 'Ошибка сети'; });
      }
      function planCurrentFilm() {
        if (!token()) { rememberAction('plan'); loginNow(); return; }
        ensureFilm()
          .then(function (d) {
            if (!d) return;
            if (d.success) goCabinet('plan');
            else if (hint) hint.textContent = d.error || 'Не удалось подготовить фильм';
          })
          .catch(function () { if (hint) hint.textContent = 'Ошибка сети'; });
      }
      function consumePendingAction() {
        try {
          var pending = sessionStorage.getItem('mp_public_film_action') || '';
          if (!pending || pending.split(':')[1] !== kpId || !token()) return;
          sessionStorage.removeItem('mp_public_film_action');
          if (pending.indexOf('plan:') === 0) planCurrentFilm();
          else if (pending.indexOf('add:') === 0) addCurrentFilm();
        } catch (_e) {}
      }

      var addBtn = document.getElementById('add-btn');
      if (addBtn) addBtn.addEventListener('click', addCurrentFilm);
      var loginBtn = document.getElementById('login-btn');
      if (loginBtn) loginBtn.addEventListener('click', loginNow);

      var planWatchBtn = document.getElementById('plan-watch-btn');
      if (planWatchBtn) planWatchBtn.addEventListener('click', planCurrentFilm);

      var rg = document.getElementById('rate-grid');
      if (rg) {
        rg.querySelectorAll('[data-rate]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            if (!token()) { loginNow(); return; }
            var v = Number(btn.getAttribute('data-rate'));
            if (!(v >= 1 && v <= 10)) return;
            ensureFilm()
              .then(function (d) {
                if (!d || !d.success || !d.film_id) throw new Error('Не удалось подготовить фильм');
                return fetch(apiBase + '/api/site/film/' + encodeURIComponent(String(d.film_id)) + '/rating', {
                  method: 'POST',
                  headers: authHeaders(),
                  body: JSON.stringify({ rating: v })
                });
              })
              .then(function (r) {
                if (!r) return null;
                if (r.status === 401) { loginNow(); return null; }
                return r.json();
              })
              .then(function (d) {
                if (!d) return;
                if (d.success) hint.textContent = 'Оценка ' + String(v) + '/10 сохранена';
                else hint.textContent = d.error || 'Не удалось поставить оценку';
              })
              .catch(function (e) {
                hint.textContent = (e && e.message) || 'Ошибка оценки';
              });
          });
        });
      }

      function bindPublicSearch() {
        var input = document.getElementById('header-search-input');
        var dd = document.getElementById('header-search-dropdown');
        var clearBtn = document.getElementById('header-search-clear');
        var timer = null;
        var lastAt = 0;
        var controller = null;
        var seq = 0;
        if (!input || !dd) return;
        function escapeText(v) {
          return String(v || '').replace(/[&<>"']/g, function (c) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
          });
        }
        function hide() { dd.classList.add('hidden'); dd.innerHTML = ''; }
        function render(items) {
          if (!items || !items.length) {
            dd.innerHTML = '<div class="search-result-meta">Ничего не нашлось</div>';
            dd.classList.remove('hidden');
            return;
          }
          dd.innerHTML = items.slice(0, 6).map(function (it) {
            var meta = [it.type === 'series' ? 'Сериал' : 'Фильм', it.year].filter(Boolean).join(' · ');
            var posterSafe = String(it.poster || '').replace(/"/g, '&quot;');
            return '<a class="search-result" href="/f/' + encodeURIComponent(String(it.kp_id)) + '">' +
              (posterSafe ? '<img src="' + posterSafe + '" alt="" loading="lazy">' : '<span></span>') +
              '<span><span class="search-result-title">' + escapeText(it.title) + '</span>' +
              '<span class="search-result-meta">' + escapeText(meta) + '</span></span></a>';
          }).join('');
          dd.classList.remove('hidden');
        }
        function run(q) {
          q = String(q || '').trim();
          if (clearBtn) clearBtn.classList.toggle('hidden', !q);
          if (q.length < 2) { hide(); return; }
          var wait = Math.max(0, 1000 - (Date.now() - lastAt));
          clearTimeout(timer);
          timer = setTimeout(function () {
            lastAt = Date.now();
            var mySeq = ++seq;
            if (controller) controller.abort();
            controller = window.AbortController ? new AbortController() : null;
            dd.innerHTML = '<div class="search-result-meta">Ищем…</div>';
            dd.classList.remove('hidden');
            fetch(apiBase + '/api/public/search?q=' + encodeURIComponent(q.slice(0, 60)), {
              method: 'GET',
              mode: 'cors',
              signal: controller ? controller.signal : undefined
            })
              .then(function (r) { return r.json(); })
              .then(function (data) {
                if (mySeq !== seq) return;
                render((data && data.items) || []);
              })
              .catch(function (e) {
                if (e && e.name === 'AbortError') return;
                if (mySeq === seq) dd.innerHTML = '<div class="search-result-meta">Не удалось найти</div>';
              });
          }, wait || 260);
        }
        input.addEventListener('input', function () { run(input.value); });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') { input.value = ''; if (clearBtn) clearBtn.classList.add('hidden'); hide(); }
          if (e.key === 'Enter') {
            var first = dd.querySelector('a.search-result');
            if (first) window.location.href = first.href;
          }
        });
        input.addEventListener('focus', function () {
          if (input.value.trim().length >= 2 && dd.innerHTML) dd.classList.remove('hidden');
        });
        if (clearBtn) {
          clearBtn.addEventListener('click', function () {
            input.value = '';
            clearBtn.classList.add('hidden');
            hide();
            input.focus();
          });
        }
        document.addEventListener('click', function (e) {
          var wrap = document.getElementById('header-search');
          if (wrap && !wrap.contains(e.target)) dd.classList.add('hidden');
        });
      }
      bindPublicSearch();
      consumePendingAction();
    })();
  </script>
</body>
</html>
