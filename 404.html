<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <script>
    (function () {
      try {
        var path = (location.pathname || '/').replace(/\/$/, '') || '/';
        var params = new URLSearchParams(location.search || '');
        if (path === '/' || path === '/index.html') {
          var kp = params.get('kp_open');
          if (kp && /^\d+$/.test(kp)) {
            params.delete('kp_open');
            params.delete('open_login');
            params.delete('action');
            var rest = params.toString();
            location.replace('/f/' + kp + (rest ? '?' + rest : '') + location.hash);
          }
        }
      } catch (_e) {}
    })();
  </script>

  <script>
    (function () {
      var OG_API = 'https://api.movie-planner.ru';
      var path = location.pathname || '';
      var mFilm = path.match(/^\/f\/(\d+)\/?$/);
      var mStaff = path.match(/^\/s\/(\d+)\/?$/);
      var mUser = path.match(/^\/u\/(-?\d+)\/?$/);
      if (mFilm) {
        var kp = mFilm[1];
        try { document.documentElement.classList.add('mp-route-pending'); } catch (_pF) {}
        var poster = OG_API + '/api/og/film/' + kp + '.jpg';
        var page = location.origin + '/f/' + kp;
        var ogTitleF = 'Фильм · Movie Planner';
        var ogDescF = 'Карточка фильма в Movie Planner';
        var pageTitleF = ogTitleF;
        var metaKeywordsF = '';
        try {
          var xhrF = new XMLHttpRequest();
          xhrF.open('GET', '/api/public/film/' + encodeURIComponent(kp), false);
          xhrF.send(null);
          if (xhrF.status === 200) {
            var payloadF = JSON.parse(xhrF.responseText);
            if (payloadF && payloadF.success && payloadF.film) {
              var fl = payloadF.film;
              if (fl.og_image_url) poster = fl.og_image_url;
              if (fl.title) {
                ogTitleF = fl.year ? (fl.title + ' (' + fl.year + ')') : fl.title;
                pageTitleF = fl.page_title || (ogTitleF + ' — смотреть, описание, рейтинг | Movie Planner');
              }
              if (fl.meta_description) ogDescF = fl.meta_description;
              else if (fl.description) ogDescF = fl.description;
              if (fl.meta_keywords) metaKeywordsF = fl.meta_keywords;
            }
          }
        } catch (_eF) {}
        var escF = function (s) {
          return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        };
        document.write(
          '<title>Фильм · Movie Planner</title>' +
          '<meta property="og:type" content="video.movie">' +
          '<meta property="og:url" content="' + page + '">' +
          '<meta property="og:site_name" content="Movie Planner">' +
          '<meta property="og:locale" content="ru_RU">' +
          '<meta property="og:title" content="' + escF(ogTitleF) + '">' +
          '<meta property="og:description" content="' + escF(ogDescF) + '">' +
          '<meta property="og:image" content="' + escF(poster) + '">' +
          '<meta property="og:image:secure_url" content="' + escF(poster) + '">' +
          '<meta property="og:image:width" content="1200">' +
          '<meta property="og:image:height" content="630">' +
          '<meta property="og:image:alt" content="Постер: ' + escF(ogTitleF) + '">' +
          '<meta name="description" content="' + escF(ogDescF) + '">' +
          (metaKeywordsF ? ('<meta name="keywords" content="' + escF(metaKeywordsF) + '">') : '') +
          '<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">' +
          '<meta name="twitter:card" content="summary_large_image">' +
          '<meta name="twitter:title" content="' + escF(ogTitleF) + '">' +
          '<meta name="twitter:description" content="' + escF(ogDescF) + '">' +
          '<meta name="twitter:image" content="' + escF(poster) + '">' +
          '<meta name="twitter:image:alt" content="Постер: ' + escF(ogTitleF) + '">' +
          '<link rel="icon" href="' + escF(poster) + '">' +
          '<link rel="apple-touch-icon" href="' + escF(poster) + '">' +
          '<link rel="canonical" href="' + page + '">'
        );
        return;
      }
      if (mStaff) {
        var pid = mStaff[1];
        try { document.documentElement.classList.add('mp-route-pending'); } catch (_pS) {}
        var pageS = location.origin + '/s/' + pid;
        var photo = OG_API + '/api/og/staff/' + pid + '.jpg';
        var ogTitle = 'Персона · Movie Planner';
        var ogDesc = 'Страница актёра и фильмография в Movie Planner';
        var pageTitle = ogTitle;
        var metaKeywordsS = '';
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', '/api/public/staff/' + encodeURIComponent(pid), false);
          xhr.send(null);
          if (xhr.status === 200) {
            var payload = JSON.parse(xhr.responseText);
            if (payload && payload.success && payload.staff) {
              var st = payload.staff;
              if (st.og_image_url) photo = st.og_image_url;
              if (st.og_title) ogTitle = st.og_title;
              if (st.meta_description) ogDesc = st.meta_description;
              else if (st.og_description) ogDesc = st.og_description;
              if (st.page_title) pageTitle = st.page_title;
              else if (st.name) pageTitle = st.name + ' — фильмография, фильмы | Movie Planner';
              if (st.meta_keywords) metaKeywordsS = st.meta_keywords;
            }
          }
        } catch (_e) {}
        var esc = function (s) {
          return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        };
        document.write(
          '<title>' + esc(pageTitle) + '</title>' +
          '<meta property="og:type" content="profile">' +
          '<meta property="og:url" content="' + pageS + '">' +
          '<meta property="og:site_name" content="Movie Planner">' +
          '<meta property="og:locale" content="ru_RU">' +
          '<meta property="og:title" content="' + esc(ogTitle) + '">' +
          '<meta property="og:description" content="' + esc(ogDesc) + '">' +
          '<meta property="og:image" content="' + esc(photo) + '">' +
          '<meta property="og:image:secure_url" content="' + esc(photo) + '">' +
          '<meta property="og:image:width" content="1200">' +
          '<meta property="og:image:height" content="630">' +
          '<meta property="og:image:alt" content="Фото: ' + esc(ogTitle) + '">' +
          '<meta name="description" content="' + esc(ogDesc) + '">' +
          (metaKeywordsS ? ('<meta name="keywords" content="' + esc(metaKeywordsS) + '">') : '') +
          '<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">' +
          '<meta name="twitter:card" content="summary_large_image">' +
          '<meta name="twitter:title" content="' + esc(ogTitle) + '">' +
          '<meta name="twitter:description" content="' + esc(ogDesc) + '">' +
          '<meta name="twitter:image" content="' + esc(photo) + '">' +
          '<meta name="twitter:image:alt" content="Фото: ' + esc(ogTitle) + '">' +
          '<link rel="icon" href="' + esc(photo) + '">' +
          '<link rel="apple-touch-icon" href="' + esc(photo) + '">' +
          '<link rel="canonical" href="' + pageS + '">'
        );
        return;
      }
      if (mUser) {
        var uid = mUser[1];
        try { document.documentElement.classList.add('mp-route-pending'); } catch (_pU) {}
        var pageU = location.origin + '/u/' + uid;
        var ogTitleU = 'Профиль · Movie Planner';
        var ogDescU = 'Профиль пользователя Movie Planner';
        var pageTitleU = ogTitleU;
        var photoU = OG_API + '/api/og/user/' + uid + '.jpg';
        try {
          var xhrU = new XMLHttpRequest();
          xhrU.open('GET', '/api/public/user/' + encodeURIComponent(uid), false);
          xhrU.send(null);
          if (xhrU.status === 200) {
            var payloadU = JSON.parse(xhrU.responseText);
            if (payloadU && payloadU.success && payloadU.user) {
              var u = payloadU.user;
              if (u.og_image_url) photoU = u.og_image_url;
              else if (u.photo_url) photoU = u.photo_url.indexOf('http') === 0 ? u.photo_url : (location.origin + u.photo_url);
              if (u.og_title) ogTitleU = u.og_title;
              if (u.og_description) ogDescU = u.og_description;
              if (u.name) pageTitleU = u.name + ' · Movie Planner';
            }
          }
        } catch (_eU) {}
        var escU = function (s) {
          return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        };
        document.write(
          '<title>' + escU(pageTitleU) + '</title>' +
          '<meta property="og:type" content="profile">' +
          '<meta property="og:url" content="' + pageU + '">' +
          '<meta property="og:site_name" content="Movie Planner">' +
          '<meta property="og:locale" content="ru_RU">' +
          '<meta property="og:title" content="' + escU(ogTitleU) + '">' +
          '<meta property="og:description" content="' + escU(ogDescU) + '">' +
          '<meta property="og:image" content="' + escU(photoU) + '">' +
          '<meta property="og:image:secure_url" content="' + escU(photoU) + '">' +
          '<meta property="og:image:width" content="1200">' +
          '<meta property="og:image:height" content="630">' +
          '<meta property="og:image:alt" content="Профиль: ' + escU(ogTitleU) + '">' +
          '<meta name="description" content="' + escU(ogDescU) + '">' +
          '<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">' +
          '<meta name="twitter:card" content="summary_large_image">' +
          '<meta name="twitter:title" content="' + escU(ogTitleU) + '">' +
          '<meta name="twitter:description" content="' + escU(ogDescU) + '">' +
          '<meta name="twitter:image" content="' + escU(photoU) + '">' +
          '<meta name="twitter:image:alt" content="Аватар: ' + escU(ogTitleU) + '">' +
          '<link rel="canonical" href="' + pageU + '">'
        );
        return;
      }
      document.write('<meta name="robots" content="noindex,nofollow">');
    })();
  </script>

  html.mp-http-not-found body > script,
  html.mp-http-not-found noscript { display: none !important; }
  .mp-seo-article {
    max-width: 920px;

  .mp-seo-article dt { font-weight: 600; margin-top: 10px; color: #fff; }
  .mp-seo-article dd { margin: 4px 0 0; }
  </style>
  <script>
    (function () {
      var loc = window.location;
      var path = loc.pathname || '';
      var isFilm = /^\/f\/(\d+)\/?$/.test(path);
      var isStaff = /^\/s\/(\d+)\/?$/.test(path);
      var isUser = /^\/u\/(-?\d+)\/?$/.test(path);
      if (isFilm || isStaff || isUser) return;
      document.documentElement.classList.add('mp-http-not-found');
      var page = document.getElementById('mp-not-found-page');
      if (page) page.classList.remove('hidden');
    })();
  </script>
  <script>
    (function () {
      var m = location.pathname.match(/^\/u\/(-?\d+)\/?$/);
      if (!m) return;
      try {
        var active = localStorage.getItem('mp_site_active_chat_id');
        var sessions = JSON.parse(localStorage.getItem('mp_site_sessions') || '[]');
        var token = null;
        if (Array.isArray(sessions)) {
          for (var i = 0; i < sessions.length; i++) {
            if (String(sessions[i].chat_id) === String(active) && sessions[i].token) {
              token = sessions[i].token;
              break;
            }
          }
        }
        if (!token) token = localStorage.getItem('mp_site_token');
        if (token) {
          var qs = location.search || '';
          window.location.replace('/?__spa=' + encodeURIComponent('/u/' + m[1]) + (qs ? qs.replace(/^\?/, '&') : ''));
        }
      } catch (_e) {}
    })();
  </script>
