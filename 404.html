<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Movie Planner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0b13;
      color: #f4f6ff;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 20px 16px 28px; }
    .brand { color: #aab3d2; font-size: 13px; margin-bottom: 14px; }
    .card {
      display: grid;
      grid-template-columns: 120px minmax(0,1fr);
      gap: 14px;
      background: #111424;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 16px;
      padding: 12px;
    }
    .poster { width: 120px; height: 178px; border-radius: 10px; object-fit: cover; background: #1a1f33; }
    h1 { margin: 0; font-size: 22px; line-height: 1.25; }
    p { margin: 10px 0 0; color: #aab3d2; line-height: 1.45; font-size: 14px; }
    .actions { margin-top: 14px; display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
    .btn {
      display: inline-block; text-decoration: none; text-align: center;
      color: #fff; padding: 12px 14px; border-radius: 12px; font-weight: 600; font-size: 14px;
      border: 0;
    }
    .btn-main { background: linear-gradient(135deg,#a855f7,#ec4899); }
    .btn-sec { background: rgba(255,255,255,.1); }
    .rate-grid { margin-top: 12px; display: grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap: 6px; }
    .rate-btn {
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 10px;
      background: rgba(255,255,255,.04);
      color: #fff;
      padding: 8px 0;
      cursor: pointer;
    }
    .facts { margin-top: 14px; border-top: 1px solid rgba(255,255,255,.12); padding-top: 12px; display:none; }
    .facts h2 { margin: 0 0 8px; font-size: 15px; }
    .facts ul { margin: 0; padding-left: 18px; color: #aab3d2; display: grid; gap: 7px; font-size: 14px; line-height: 1.4; }
    .hint { margin-top: 10px; color: #aab3d2; font-size: 12px; }
    @media (max-width: 620px) {
      .card { grid-template-columns: 1fr; }
      .poster { width: 138px; height: 205px; margin: 0 auto; }
      .meta { text-align: center; }
      .actions { grid-template-columns: 1fr; }
      .facts { text-align: left; }
    }
  </style>
  <script>
    // SPA shim для GitHub Pages: неизвестные пути → /?__spa=…
    // /f/<kp_id> рендерим как полноценную страницу фильма прямо здесь.
    (function () {
      var loc = window.location;
      var userMatch = loc.pathname.match(/^\/u\/(\d+)\/?$/);
      if (userMatch) {
        loc.replace(loc.origin + '/?add=' + encodeURIComponent(userMatch[1]) + loc.hash);
        return;
      }
      var filmMatch = loc.pathname.match(/^\/f\/(\d+)\/?$/);
      if (filmMatch) {
        var kpId = filmMatch[1];
        var poster = 'https://st.kp.yandex.net/images/film_big/' + kpId + '.jpg';
        var tgMini = 'https://t.me/movie_planner_bot/app?startapp=' + encodeURIComponent('film_' + kpId);
        var apiBase = 'https://api.movie-planner.ru';
        document.title = 'Фильм · Movie Planner';
        document.body.innerHTML =
          '<div class="wrap">' +
          '<div class="brand">Movie Planner</div>' +
          '<div class="card">' +
          '<img class="poster" src="' + poster + '" alt="Постер" onerror="this.style.visibility=\'hidden\'">' +
          '<div class="meta">' +
          '<h1 id="film-title">Фильм #' + kpId + '</h1>' +
          '<p id="film-desc">Загружаем карточку фильма…</p>' +
          '<div class="actions">' +
          '<button class="btn btn-main" id="add-btn" type="button">Добавить в базу</button>' +
          '<button class="btn btn-sec" id="facts-btn" type="button">Интересные факты</button>' +
          '<a class="btn btn-sec" href="/?kp_open=' + encodeURIComponent(kpId) + '">Открыть кабинет</a>' +
          '<a class="btn btn-sec" href="' + tgMini + '">Открыть в Telegram Mini App</a>' +
          '</div>' +
          '<div class="rate-grid" id="rate-grid">' +
          '<button class="rate-btn" data-rate="6" type="button">6</button>' +
          '<button class="rate-btn" data-rate="7" type="button">7</button>' +
          '<button class="rate-btn" data-rate="8" type="button">8</button>' +
          '<button class="rate-btn" data-rate="9" type="button">9</button>' +
          '<button class="rate-btn" data-rate="10" type="button">10</button>' +
          '</div>' +
          '<div class="facts" id="facts-block"><h2>Интересные факты</h2><ul id="facts-list"></ul></div>' +
          '<p class="hint" id="hint">Для добавления и оценки нужна авторизация.</p>' +
          '</div>' +
          '</div>' +
          '</div>';

        var hint = document.getElementById('hint');
        function sessions() {
          try { return JSON.parse(localStorage.getItem('mp_site_sessions') || '[]'); } catch (_e) { return []; }
        }
        function token() {
          try {
            var active = localStorage.getItem('mp_site_active_chat_id');
            var row = sessions().find(function (x) { return String(x.chat_id) === String(active); });
            return row ? row.token : null;
          } catch (_e) { return null; }
        }
        function authHeaders() {
          var h = { 'Content-Type': 'application/json' };
          var t = token();
          if (t) h.Authorization = 'Bearer ' + t;
          return h;
        }
        function loginNow() {
          if (hint) hint.textContent = 'Нужна авторизация. Перенаправляем на вход…';
          setTimeout(function () {
            loc.href = '/api/site/login?next=' + encodeURIComponent(loc.href);
          }, 260);
        }

        fetch(apiBase + '/api/public/film/' + encodeURIComponent(kpId))
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (!data || !data.success || !data.film) return;
            var f = data.film;
            var tEl = document.getElementById('film-title');
            var dEl = document.getElementById('film-desc');
            if (tEl) tEl.textContent = (f.title || 'Фильм') + (f.year ? ' (' + f.year + ')' : '');
            if (dEl) dEl.textContent = f.description || 'Откройте фильм в Movie Planner.';
            document.title = (f.title || 'Фильм') + ' · Movie Planner';
          })
          .catch(function () {});

        function ensureFilm() {
          return fetch(apiBase + '/api/site/add-film', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ kp_id: Number(kpId) })
          }).then(function (r) {
            if (r.status === 401) { loginNow(); return null; }
            return r.json();
          });
        }

        var addBtn = document.getElementById('add-btn');
        if (addBtn) {
          addBtn.addEventListener('click', function () {
            if (!token()) { loginNow(); return; }
            ensureFilm()
              .then(function (d) {
                if (!d) return;
                if (d.success) hint.textContent = 'Фильм добавлен в базу';
                else hint.textContent = d.error || 'Не удалось добавить';
              })
              .catch(function () { hint.textContent = 'Ошибка сети'; });
          });
        }

        var rg = document.getElementById('rate-grid');
        if (rg) {
          rg.querySelectorAll('[data-rate]').forEach(function (btn) {
            btn.addEventListener('click', function () {
              if (!token()) { loginNow(); return; }
              var v = Number(btn.getAttribute('data-rate'));
              if (!(v >= 1 && v <= 10)) return;
              ensureFilm()
                .then(function (d) {
                  if (!d || !d.success || !d.film_id) throw new Error('Не удалось подготовить фильм');
                  return fetch(apiBase + '/api/site/film/' + encodeURIComponent(String(d.film_id)) + '/rating', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ rating: v })
                  });
                })
                .then(function (r) {
                  if (!r) return null;
                  if (r.status === 401) { loginNow(); return null; }
                  return r.json();
                })
                .then(function (d) {
                  if (!d) return;
                  if (d.success) hint.textContent = 'Оценка ' + String(v) + '/10 сохранена';
                  else hint.textContent = d.error || 'Не удалось поставить оценку';
                })
                .catch(function (e) {
                  hint.textContent = (e && e.message) || 'Ошибка оценки';
                });
            });
          });
        }

        var factsBtn = document.getElementById('facts-btn');
        if (factsBtn) {
          factsBtn.addEventListener('click', function () {
            fetch(apiBase + '/api/public/film/' + encodeURIComponent(kpId) + '/facts')
              .then(function (r) { return r.json(); })
              .then(function (d) {
                var block = document.getElementById('facts-block');
                var list = document.getElementById('facts-list');
                if (!block || !list) return;
                list.innerHTML = '';
                var arr = [];
                if (d && Array.isArray(d.facts)) arr = d.facts.slice(0, 5);
                if (!arr.length && d && Array.isArray(d.bloopers)) arr = d.bloopers.slice(0, 5);
                if (!arr.length) arr = ['Пока нет фактов для этого фильма.'];
                arr.forEach(function (x) {
                  var li = document.createElement('li');
                  li.textContent = String(x || '');
                  list.appendChild(li);
                });
                block.style.display = '';
                hint.textContent = 'Факты загружены';
              })
              .catch(function () { hint.textContent = 'Не удалось загрузить факты'; });
          });
        }
        return;
      }
      var target = loc.pathname + loc.search + loc.hash;
      loc.replace(loc.origin + '/?__spa=' + encodeURIComponent(target));
    })();
  </script>
</head>
<body>
  <noscript>
    <p style="color:#fff;background:#111;padding:20px;font-family:sans-serif">
      Страница не найдена. <a href="/" style="color:#ec4899">Открыть Movie Planner</a>.
    </p>
  </noscript>
</body>
</html>
