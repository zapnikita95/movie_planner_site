<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Вход — Movie Planner</title>
<style>
:root { --bg:#0f0f13; --card:#1a1a22; --bd:#2a2a38; --txt:#fff; --muted:#9aa; --acc:#ff5722; --err:#f66; }
* { box-sizing: border-box; }
body { margin:0; font-family: system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--txt);
  min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 48px; }
.wrap { width:100%; max-width:420px; }
h1 { font-size:1.35rem; font-weight:700; margin:0 0 8px; line-height:1.25; }
.lead { color:var(--muted); font-size:14px; line-height:1.45; margin:0 0 20px; }
.card { background:var(--card); border:1px solid var(--bd); border-radius:16px; padding:18px 16px;
  display:flex; flex-direction:column; gap:12px; }
label.chk { display:flex; gap:10px; align-items:flex-start; font-size:13px; line-height:1.4; color:var(--muted); cursor:pointer; }
label.chk input { margin-top:3px; flex-shrink:0; }
.btn-row { display:flex; flex-direction:column; gap:10px; }
a.btn, button.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:48px;
  padding:12px 16px; border-radius:14px; font-weight:600; font-size:15px; text-decoration:none; border:1px solid var(--bd);
  cursor:pointer; text-align:center; word-break:break-word; }
a.btn-primary { background:var(--acc); border-color:var(--acc); color:#fff; }
a.btn-google { background:#fff; color:#202124; border-color:#dadce0; }
a.btn-ya { background:#fc3f1e; border-color:#fc3f1e; color:#fff; }
a.btn[disabled], button[disabled] { opacity:0.45; pointer-events:none; }
.tg-slot { min-height:56px; display:flex; align-items:center; justify-content:center; }
.err { color:var(--err); font-size:14px; margin:0; }
.row-code { display:flex; flex-direction:column; gap:8px; }
input.code { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--bd); background:#0f0f13; color:#fff; font-size:16px; }
footer.nav { margin-top:24px; font-size:14px; }
footer.nav a { color:var(--acc); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Вход в Movie Planner</h1>
  <p class="lead">Тот же аккаунт, что в приложении: Google, Яндекс, Telegram или код из бота.</p>
  <p class="err" id="err-box" role="alert" hidden></p>
  <div class="card">
    <label class="chk"><input type="checkbox" id="priv"/> Согласен с <a href="/politika.html" target="_blank" rel="noopener">политикой конфиденциальности</a> (нужно для Google и Яндекс)</label>
    <div class="btn-row">
      <a class="btn btn-google" id="go-g" href="/api/site/oauth/google/start?accept=1" disabled>Google</a>
      <a class="btn btn-ya" id="go-y" href="/api/site/oauth/yandex/start?accept=1" disabled>Яндекс</a>
    </div>
    <div class="tg-slot" id="tg-wrap">
      <script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="movie_planner_bot"
        data-size="large"
        data-radius="14"
        data-onauth="onTelegramAuth(user)"
        data-request-access="write"></script>
    </div>
    <p class="lead" style="margin:0;font-size:13px">Telegram: виджет выше (если кнопки нет — блокировщик или запрет скриптов).</p>
    <form class="row-code" id="code-form">
      <label for="code" class="lead" style="margin:0">Код из бота /code</label>
      <input class="code" id="code" autocomplete="one-time-code" placeholder="Например AB12CD34EF" maxlength="32"/>
      <button type="submit" class="btn btn-primary" style="border:none;width:100%">Войти по коду</button>
      <p class="err" id="code-err"></p>
    </form>
  </div>
  <footer class="nav"><a href="/">← На главную сайта</a> · <a href="/#cabinet">Личный кабинет</a></footer>
</div>
<script>
var SITE_BASE = location.origin.indexOf("movie-planner.ru") >= 0 ? location.origin : "https://movie-planner.ru";
var ERR_UI = {
  privacy: "Отметьте согласие с политикой для Google и Яндекс.",
  csrf: "Сессия входа устарела — попробуйте ещё раз.",
  google: "Не удалось войти через Google.",
  yandex: "Не удалось войти через Яндекс.",
  account: "Не удалось создать учётную запись.",
  session: "Ошибка сохранения сессии.",
  no_oauth: "OAuth не настроен на сервере.",
  oauth: "Ошибка авторизации.",
  code: "Код от Google не получен."
};
(function showErr() {
  try {
    var p = new URLSearchParams(location.search).get("error");
    if (!p) return;
    var el = document.getElementById("err-box");
    if (!el) return;
    el.textContent = ERR_UI[p] || p;
    el.hidden = false;
  } catch (e) {}
})();
function onTelegramAuth(user) {
  var priv = document.getElementById("priv");
  fetch("/api/site/auth/telegram-widget", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(Object.assign({}, user, { accept_privacy: !!(priv && priv.checked), acceptPrivacy: !!(priv && priv.checked) }))
  }).then(function(r){ return r.json(); }).then(function(d){
    if (d.success && d.token) {
      saveSession(d);
      window.location.href = SITE_BASE + "/#cabinet";
      return;
    }
    alert(d.error || "Не удалось войти");
  }).catch(function(){ alert("Ошибка сети"); });
}
function saveSession(d) {
  try {
    var raw = localStorage.getItem("mp_site_sessions");
    var arr = [];
    if (raw) { try { arr = JSON.parse(raw); } catch(e) {} }
    if (!Array.isArray(arr)) arr = [];
    arr = arr.filter(function(s){ return s && String(s.chat_id) !== String(d.chat_id); });
    arr.push({ chat_id: d.chat_id, token: d.token, name: d.name || "Профиль" });
    localStorage.setItem("mp_site_sessions", JSON.stringify(arr));
    localStorage.setItem("mp_site_active_chat_id", String(d.chat_id));
  } catch(e) {}
}
document.addEventListener("DOMContentLoaded", function() {
  var cb = document.getElementById("priv");
  function sync() {
    var ok = cb && cb.checked;
    var g = document.getElementById("go-g");
    var y = document.getElementById("go-y");
    if (g) g.toggleAttribute("disabled", !ok);
    if (y) y.toggleAttribute("disabled", !ok);
  }
  if (cb) cb.addEventListener("change", sync);
  sync();
  var form = document.getElementById("code-form");
  if (form) form.addEventListener("submit", function(ev) {
    ev.preventDefault();
    var code = document.getElementById("code").value.trim().toUpperCase();
    if (!code) return;
    fetch("/api/site/validate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code: code })
    }).then(function(r){ return r.json(); }).then(function(d){
      if (d.success && d.token) {
        saveSession(d);
        window.location.href = SITE_BASE + "/#cabinet";
      } else {
        var ce = document.getElementById("code-err");
        if (ce) ce.textContent = d.error || "Ошибка";
      }
    });
  });
});
</script>
</body>
</html>
