<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="360" height="540" viewBox="0 0 360 540" role="img" aria-label="Movie Planner">
  <defs>
    <linearGradient id="mp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120818"/>
      <stop offset="45%" stop-color="#1a0f24"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="mp-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d7b"/>
      <stop offset="52%" stop-color="#9b4dff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="mp-glow" cx="50%" cy="36%" r="46%">
      <stop offset="0%" stop-color="#ff2d7b" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#9b4dff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="360" height="540" fill="url(#mp-bg)"/>
  <rect width="360" height="540" fill="url(#mp-glow)"/>
  <circle cx="180" cy="210" r="92" fill="url(#mp-neon)" opacity="0.12"/>
  <image href="/images/icon48.png" x="118" y="148" width="124" height="124" preserveAspectRatio="xMidYMid meet"/>
  <text x="180" y="360" text-anchor="middle" fill="url(#mp-neon)" font-family="'Unbounded', system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="0.06em">Movie</text>
  <text x="180" y="392" text-anchor="middle" fill="#ffffff" font-family="'Unbounded', system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="0.10em">Planner</text>
</svg>
