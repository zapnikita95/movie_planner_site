<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="360" height="360" viewBox="0 0 360 360" role="img" aria-label="Movie Planner">
  <defs>
    <linearGradient id="mp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120818"/>
      <stop offset="100%" stop-color="#1a0f24"/>
    </linearGradient>
    <linearGradient id="mp-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d7b"/>
      <stop offset="55%" stop-color="#9b4dff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <clipPath id="mp-avatar-clip">
      <circle cx="180" cy="180" r="132"/>
    </clipPath>
  </defs>
  <rect width="360" height="360" fill="url(#mp-bg)"/>
  <circle cx="180" cy="180" r="134" fill="none" stroke="url(#mp-ring)" stroke-width="4" opacity="0.85"/>
  <g clip-path="url(#mp-avatar-clip)">
    <rect width="360" height="360" fill="#120818"/>
    <image href="/images/icon48.png" x="118" y="118" width="124" height="124" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>
